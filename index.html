<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ MUNDIAL26 — ЧМ 2026 Живой трекер</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0f0d; --acc:#c7f93b; --live:#ff4d3d; --txt:#f4f8f5;
    --mut:#9aa39e; --mut2:#7d867f; --line:rgba(255,255,255,.1);
    --card:rgba(255,255,255,.025); --cardb:rgba(255,255,255,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
  .osw{font-family:'Oswald',sans-serif}
  .wrap{max-width:1320px;margin:0 auto;padding:0 32px}
  @keyframes flyA{0%,10%{offset-distance:0%}64%,100%{offset-distance:100%}}
  @keyframes depth{0%,10%{transform:scale(.5)}38%{transform:scale(1.18)}64%,100%{transform:scale(.72)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes drawA{0%,10%{stroke-dashoffset:780}64%,100%{stroke-dashoffset:0}}
  @keyframes shadowA{0%,10%{left:9%;width:56px;opacity:.42}38%{opacity:.14}64%,100%{left:78%;width:64px;opacity:0}}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.8)}}
  @keyframes tickerMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  .hero{position:relative;overflow:hidden;background:var(--bg);padding-bottom:58px}
  .hero .bg1{position:absolute;inset:0;background:radial-gradient(110% 80% at 78% 18%,rgba(199,249,59,.10),transparent 55%),radial-gradient(120% 90% at 20% 100%,rgba(60,110,80,.22),transparent 60%),var(--bg)}
  .hero .bg2{position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.035) 0 1px,transparent 1px 88px),repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 88px);-webkit-mask-image:radial-gradient(120% 100% at 70% 30%,#000 30%,transparent 80%);mask-image:radial-gradient(120% 100% at 70% 30%,#000 30%,transparent 80%)}
  .hero .bg3{position:absolute;inset:0;box-shadow:inset 0 0 200px 40px rgba(0,0,0,.65);pointer-events:none}
  .hero .inner{position:relative;z-index:5}
  nav{display:flex;align-items:center;justify-content:space-between;padding:26px 0}
  .logo{display:flex;align-items:center;gap:13px}
  .logo .box{width:36px;height:36px;border-radius:9px;background:var(--acc);display:flex;align-items:center;justify-content:center;color:var(--bg);font-family:'Oswald';font-weight:700;font-size:18px}
  .logo .nm{font-family:'Oswald';font-weight:600;letter-spacing:.2em;font-size:15px;text-transform:uppercase}
  .logo .nm span{color:var(--acc)}
  .navlinks{display:flex;align-items:center;gap:34px;font-family:'Oswald';font-weight:500;font-size:13px;letter-spacing:.14em;text-transform:uppercase}
  .navlinks a{color:var(--mut);text-decoration:none;cursor:pointer}
  .navlinks a.on{color:var(--txt)}
  .navlinks a small{color:var(--mut2)}
  .navlinks .nlive{display:flex;align-items:center;gap:7px;color:var(--txt)}
  .navlinks .nlive .d{width:8px;height:8px;border-radius:50%;background:var(--live);animation:pulse 1.4s infinite}
  .navright{display:flex;align-items:center;gap:16px}
  .lang{display:flex;border:1px solid rgba(255,255,255,.16);border-radius:999px;overflow:hidden;font-family:'Oswald';font-weight:500;font-size:12px;letter-spacing:.1em;cursor:pointer}
  .lang span{padding:7px 13px;color:var(--mut)}
  .lang span.on{background:var(--acc);color:var(--bg)}
  .clockbox{font-family:'Oswald';display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.16);font-size:13px;letter-spacing:.08em}
  .clockbox .d{width:8px;height:8px;border-radius:50%;background:var(--live);animation:pulse 1.4s infinite}
  .clockbox b{font-variant-numeric:tabular-nums}
  .hgrid{display:grid;grid-template-columns:1.02fr .98fr;gap:16px;align-items:center;padding-top:24px;min-height:560px}
  .eyebrow{display:flex;align-items:center;gap:11px;font-family:'Oswald';font-weight:500;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--acc)}
  .eyebrow .d{width:9px;height:9px;border-radius:50%;background:var(--acc)}
  h1.title{margin:24px 0 0;font-family:'Oswald';font-weight:700;text-transform:uppercase;line-height:.86;letter-spacing:-.01em;font-size:104px}
  h1.title .stroke{-webkit-text-stroke:2px var(--acc);color:transparent}
  .lead{margin:26px 0 0;max-width:430px;font-size:16px;line-height:1.6;color:#aab4af;font-weight:500}
  .lead small{display:block;margin-top:6px;color:var(--mut2);font-size:14px}
  .cta{display:flex;align-items:center;gap:14px;margin-top:34px}
  .btn-lime{display:flex;align-items:center;gap:10px;padding:15px 26px;border-radius:999px;background:var(--acc);color:var(--bg);font-family:'Oswald';font-weight:600;font-size:15px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none}
  .btn-lime .d{width:8px;height:8px;border-radius:50%;background:var(--bg)}
  .btn-ghost{padding:15px 26px;border-radius:999px;border:1px solid rgba(255,255,255,.2);color:var(--txt);font-family:'Oswald';font-weight:500;font-size:15px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;background:none}
  .hstats{display:flex;gap:40px;margin-top:46px}
  .hstats .n{font-family:'Oswald';font-weight:700;font-size:34px;line-height:1}
  .hstats .l{font-size:12px;color:var(--mut2);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:6px}
  .hstats .sep{width:1px;background:rgba(255,255,255,.12)}
  .ballstage{position:relative;width:720px;height:560px;justify-self:end}
  .ticker{position:relative;z-index:6;margin-top:30px;height:58px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:rgba(8,11,9,.6);display:flex;align-items:center;overflow:hidden}
  .ticker .tag{flex:none;display:flex;align-items:center;gap:8px;padding:0 22px;height:100%;background:var(--live);color:var(--bg);font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:.16em;text-transform:uppercase}
  .ticker .tag .d{width:8px;height:8px;border-radius:50%;background:var(--bg);animation:pulse 1.2s infinite}
  .ticker .track{flex:1;overflow:hidden;white-space:nowrap}
  .ticker .move{display:inline-flex;gap:42px;padding-left:30px;font-family:'Oswald';font-weight:500;font-size:14px;letter-spacing:.06em;color:#cdd4cf;animation:tickerMove 30s linear infinite}
  .ticker .move b{color:var(--acc)}
  .ticker .move .up{color:var(--mut2)}

  .main{padding:70px 0 90px;border-top:1px solid rgba(255,255,255,.06)}
  .sched-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:18px}
  h2.sec{margin:6px 0 0;font-family:'Oswald';font-weight:700;font-size:52px;line-height:.9;text-transform:uppercase}
  h2.sec span{color:#5c6360}
  .tabs{display:flex;gap:8px;font-family:'Oswald';font-weight:500;font-size:13px;letter-spacing:.1em;text-transform:uppercase}
  .tab{padding:10px 20px;border-radius:999px;border:1px solid rgba(255,255,255,.16);color:var(--mut);cursor:pointer;transition:.15s}
  .tab:hover{color:var(--txt)}
  .tab.on{background:var(--acc);color:var(--bg);border-color:transparent}
  .note{background:rgba(199,249,59,.06);border:1px solid rgba(199,249,59,.22);color:#cfe39a;padding:11px 16px;border-radius:10px;font-size:13px;margin-bottom:20px;font-weight:500}
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .pill{padding:9px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.16);color:var(--mut);cursor:pointer;font-family:'Oswald';font-weight:500;font-size:12px;letter-spacing:.1em;text-transform:uppercase;transition:.15s}
  .pill:hover{color:var(--txt)}
  .pill.on{background:var(--acc);color:var(--bg);border-color:transparent}
  #stagePills{display:flex;gap:8px;flex-wrap:wrap}
  select.sel{font-family:'Oswald';font-weight:500;font-size:12px;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.16);color:var(--txt);padding:9px 14px;border-radius:999px;outline:none;cursor:pointer}
  select.sel:focus{border-color:var(--acc)}
  .count{font-family:'Oswald';font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut2);margin-left:auto}
  .pastbar{margin-bottom:14px}
  .pastbtn{font-family:'Oswald';background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.16);color:var(--mut);padding:10px 18px;border-radius:999px;cursor:pointer;font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;transition:.15s}
  .pastbtn:hover{color:var(--txt)}
  .pastbtn.on{color:var(--acc);border-color:rgba(199,249,59,.4)}
  .dayhead{display:flex;align-items:center;gap:12px;font-family:'Oswald';font-weight:500;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut2);margin:26px 4px 6px}
  .dayhead::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.08)}
  .dayhead.today{color:var(--acc)}
  .dayhead.today::after{background:linear-gradient(90deg,rgba(199,249,59,.4),transparent)}
  .feat{position:relative;border:1px solid rgba(199,249,59,.4);border-radius:14px;background:linear-gradient(120deg,rgba(199,249,59,.08),rgba(199,249,59,.02));padding:24px 30px;margin:8px 0 6px;overflow:hidden}
  .feat .bar{position:absolute;top:0;left:0;width:5px;height:100%;background:var(--acc)}
  .feat .top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .feat .lvl{display:flex;align-items:center;gap:8px;font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--live)}
  .feat .lvl .d{width:8px;height:8px;border-radius:50%;background:var(--live);animation:pulse 1.2s infinite}
  .feat .meta{font-family:'Oswald';font-weight:500;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut2)}
  .feat .body{display:flex;align-items:center;justify-content:center;gap:30px;margin-top:18px}
  .feat .side{display:flex;align-items:center;gap:16px;width:320px}
  .feat .side.h{justify-content:flex-end}
  .feat .side .tn{font-family:'Oswald';font-weight:600;font-size:24px;text-transform:uppercase}
  .feat .side .fl{font-size:30px}
  .feat .sc{font-family:'Oswald';font-weight:700;font-size:44px;color:var(--acc);line-height:1;letter-spacing:.04em;white-space:nowrap}
  .row{display:grid;grid-template-columns:84px 1fr 116px 1fr 190px;align-items:center;gap:16px;padding:18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
  .row .tm{font-family:'Oswald';font-weight:600;font-size:19px}
  .row .tm.live{color:var(--live);font-size:13px;letter-spacing:.08em;display:flex;align-items:center;gap:6px}
  .row .tm.live .d{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.2s infinite}
  .row .side{display:flex;align-items:center;gap:12px}
  .row .side.h{justify-content:flex-end}
  .row .side .tn{font-family:'Oswald';font-weight:500;font-size:17px;color:#dfe5e1;text-transform:uppercase}
  .row .side .fl{font-size:24px}
  .row .mid{text-align:center;font-family:'Oswald';font-weight:600;font-size:18px}
  .row .mid.vs{font-weight:500;font-size:14px;letter-spacing:.1em;color:#5c6360}
  .row .mid.has{color:var(--acc);font-size:22px}
  .row .rmeta{text-align:right;font-family:'Oswald';font-weight:500;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut2)}
  .row .win{color:var(--acc)}
  .gwrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .gcard h3{font-family:'Oswald';font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:13px 18px;background:rgba(255,255,255,.04);font-size:15px;color:var(--acc)}
  table{width:100%;border-collapse:collapse;font-family:'Oswald';font-size:14px}
  th,td{padding:9px 10px;text-align:center}
  th{color:var(--mut2);font-weight:500;font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  td.tn{text-align:left;font-weight:500;text-transform:uppercase}
  tbody tr{border-top:1px solid rgba(255,255,255,.06)}
  tbody tr.q1 td:first-child,tbody tr.q2 td:first-child{box-shadow:inset 3px 0 0 var(--acc)}
  tbody tr.q3 td:first-child{box-shadow:inset 3px 0 0 #f5d017}
  .pts{font-weight:700;color:var(--acc)}
  .leg{font-family:'Oswald';font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut2);margin:14px 4px 0;display:flex;gap:18px;flex-wrap:wrap}
  .leg span::before{content:"";display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:middle}
  .leg .a::before{background:var(--acc)} .leg .g::before{background:#f5d017}
  .bracket{display:flex;gap:18px;overflow-x:auto;padding-bottom:16px}
  .bcol{min-width:220px;flex:0 0 auto}
  .bcol h4{font-family:'Oswald';font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--mut2);margin-bottom:10px;text-align:center}
  .btie{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:10px}
  .btie .bn{font-family:'Oswald';font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut2);margin-bottom:7px}
  .btie .bt{display:flex;justify-content:space-between;font-family:'Oswald';font-size:14px;padding:2px 0;text-transform:uppercase}
  .btie .bt .bs{font-weight:700;color:var(--mut)}
  .btie.final{border-color:rgba(199,249,59,.5);box-shadow:0 0 0 1px rgba(199,249,59,.2)}
  .empty{text-align:center;color:var(--mut2);padding:44px;font-family:'Oswald';letter-spacing:.06em;text-transform:uppercase;font-size:14px}
  footer{border-top:1px solid rgba(255,255,255,.06);padding:30px 0;text-align:center;font-family:'Oswald';font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut2);line-height:1.9}
  footer span{color:var(--acc)}
  @media(max-width:900px){
    h1.title{font-size:64px}
    .hgrid{grid-template-columns:1fr}
    .ballstage{display:none}
    h2.sec{font-size:38px}
  }
  @media(max-width:680px){
    .wrap{padding:0 18px}
    .navlinks{display:none}
    .row{grid-template-columns:1fr auto;grid-template-areas:"h mid" "a meta";gap:6px 12px;row-gap:4px}
    .row .tm{grid-column:1 / -1;margin-bottom:4px}
    .row .side.h{grid-area:h} .row .mid{grid-area:mid} .row .side.a{grid-area:a} .row .rmeta{grid-area:meta;text-align:left}
    .feat .side{width:auto} .feat .body{gap:14px}
    .feat .side .tn{font-size:18px} .feat .sc{font-size:32px}
    .hstats{gap:22px}
  }
</style>
</head>
<body>

<section class="hero">
  <div class="bg1"></div><div class="bg2"></div><div class="bg3"></div>
  <div class="inner wrap">
    <nav>
      <div class="logo"><div class="box osw">26</div><div class="nm">Mundial<span>26</span></div></div>
      <div class="navlinks">
        <a class="on" id="nlMatches" data-jump="sched"></a>
        <a id="nlGroups" data-jump="groups"></a>
        <a id="nlBracket" data-jump="bracket"></a>
        <span class="nlive"><span class="d"></span><span id="nlLive">Live</span></span>
      </div>
      <div class="navright">
        <div class="lang"><span id="langRU" class="on">RU</span><span id="langEN">EN</span></div>
        <div class="clockbox osw"><span class="d"></span><b id="clk">--:--:--</b></div>
      </div>
    </nav>

    <div class="hgrid">
      <div>
        <div class="eyebrow"><span class="d"></span><span id="heroEyebrow"></span></div>
        <h1 class="title" id="heroTitle"></h1>
        <p class="lead" id="heroLead"></p>
        <div class="cta">
          <button class="btn-lime osw" id="ctaLive"></button>
          <button class="btn-ghost osw" id="ctaSched"></button>
        </div>
        <div class="hstats">
          <div><div class="n osw">48</div><div class="l" id="stTeams"></div></div>
          <div class="sep"></div>
          <div><div class="n osw">104</div><div class="l" id="stMatches"></div></div>
          <div class="sep"></div>
          <div><div class="n osw">3</div><div class="l" id="stHosts"></div></div>
        </div>
      </div>

      <div class="ballstage">
        <div style="position:absolute;left:392px;top:70px;width:268px;height:182px;">
          <div style="position:absolute;inset:5px 5px 0 5px;background-image:repeating-linear-gradient(45deg, rgba(255,255,255,.14) 0 1px, transparent 1px 14px), repeating-linear-gradient(-45deg, rgba(255,255,255,.14) 0 1px, transparent 1px 14px);"></div>
          <div style="position:absolute;left:0;top:0;right:0;height:6px;background:#eef2f0;border-radius:3px;box-shadow:0 0 18px rgba(199,249,59,.45);"></div>
          <div style="position:absolute;left:0;top:0;bottom:0;width:6px;background:#dfe5e1;border-radius:3px;"></div>
          <div style="position:absolute;right:0;top:0;bottom:0;width:6px;background:#eef2f0;border-radius:3px;box-shadow:0 0 18px rgba(199,249,59,.45);"></div>
        </div>
        <svg viewBox="0 0 720 560" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;">
          <path d="M70,478 C 250,360 470,150 644,92" fill="none" stroke="#c7f93b" stroke-width="2.5" stroke-dasharray="3 13" stroke-linecap="round" opacity="0.85" style="stroke-dashoffset:780;animation:drawA 4s cubic-bezier(.16,.62,.28,1) infinite;"></path>
          <circle cx="70" cy="478" r="7" fill="#c7f93b"></circle>
          <circle cx="70" cy="478" r="15" fill="none" stroke="rgba(199,249,59,.4)" stroke-width="2"></circle>
        </svg>
        <div style="position:absolute;bottom:90px;left:9%;width:56px;height:18px;border-radius:50%;background:radial-gradient(closest-side, rgba(0,0,0,.55), transparent);filter:blur(3px);animation:shadowA 4s cubic-bezier(.16,.62,.28,1) infinite;"></div>
        <div style="position:absolute;top:0;left:0;width:96px;height:96px;offset-path:path('M70,478 C 250,360 470,150 644,92');offset-rotate:0deg;offset-anchor:center;animation:flyA 4s cubic-bezier(.16,.62,.28,1) infinite;filter:drop-shadow(0 0 26px rgba(199,249,59,.3));">
          <div style="width:100%;height:100%;animation:depth 4s cubic-bezier(.16,.62,.28,1) infinite;">
            <div style="width:100%;height:100%;border-radius:50%;position:relative;overflow:hidden;background:#f3f5f4;box-shadow:inset -10px -12px 24px rgba(0,0,0,.45), inset 8px 8px 16px rgba(255,255,255,.55), inset 0 0 0 1px rgba(255,255,255,.12), 0 20px 34px rgba(0,0,0,.5);">
              <div style="position:absolute;inset:0;animation:spin 0.9s linear infinite;">
                <div style="position:absolute;top:50%;left:50%;width:40%;height:40%;background:#15191b;clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);transform:translate(-50%,-50%);"></div>
                <div style="position:absolute;top:50%;left:50%;width:34%;height:34%;background:#15191b;clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);transform:translate(-50%,-50%) rotate(0deg) translateY(-95%) rotate(180deg);"></div>
                <div style="position:absolute;top:50%;left:50%;width:34%;height:34%;background:#15191b;clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);transform:translate(-50%,-50%) rotate(72deg) translateY(-95%) rotate(180deg);"></div>
                <div style="position:absolute;top:50%;left:50%;width:34%;height:34%;background:#15191b;clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);transform:translate(-50%,-50%) rotate(144deg) translateY(-95%) rotate(180deg);"></div>
                <div style="position:absolute;top:50%;left:50%;width:34%;height:34%;background:#15191b;clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);transform:translate(-50%,-50%) rotate(216deg) translateY(-95%) rotate(180deg);"></div>
                <div style="position:absolute;top:50%;left:50%;width:34%;height:34%;background:#15191b;clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);transform:translate(-50%,-50%) rotate(288deg) translateY(-95%) rotate(180deg);"></div>
              </div>
              <div style="position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 32% 26%, rgba(255,255,255,.8), rgba(255,255,255,0) 36%), radial-gradient(circle at 72% 80%, rgba(0,0,0,.42), transparent 55%);"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="ticker">
    <div class="tag osw"><span class="d"></span>Live</div>
    <div class="track"><div class="move" id="ticker"></div></div>
  </div>
</section>

<section class="main">
  <div class="wrap">

function _teamObj(t){return {name:t.name,nameEn:t.nameEn||t.name,flag:t.flag||""};}
function _groupComplete(tbl,g){return Object.keys(tbl[g]).every(function(k){return tbl[g][k].p>=3;});}
function _rankGroup(tbl,g){
  return Object.keys(tbl[g]).map(function(k){return tbl[g][k];}).sort(function(a,b){
    return b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf||(a.nameEn||a.name).localeCompare(b.nameEn||b.name);
  });
}
function _resolveSlot(en,slot,thirdAssign,koResult){
  if(!en) return null; var mm;
  if(mm=en.match(/^Winner ([A-L])$/)) return slot["WIN_"+mm[1]]||null;
  if(mm=en.match(/^2nd ([A-L])$/))    return slot["RU_"+mm[1]]||null;
  if(en.match(/^3rd ([A-L\/]+)$/))    return null; // третьи назначаются отдельно
  if(mm=en.match(/^Winner M(\d+)$/)){var r=koResult[+mm[1]];return r?r.W:null;}
  if(mm=en.match(/^Loser M(\d+)$/)){var r2=koResult[+mm[1]];return r2?r2.L:null;}
  return null;
}
function computeBracket(){
  RESOLVED={};
  var now=Date.now();
  var tbl=computeStandings();
  var groups=Object.keys(WC_DATA.groups);
  var slot={};
  groups.forEach(function(g){
    if(_groupComplete(tbl,g)){var r=_rankGroup(tbl,g);slot["WIN_"+g]=_teamObj(r[0]);slot["RU_"+g]=_teamObj(r[1]);}
  });
  // лучшие третьи места — только когда все группы доиграны
  var allDone=groups.every(function(g){return _groupComplete(tbl,g);});
  // Назначение третьих мест по официальной таблице ФИФА (Annex C)
  var thirdAssign={}; // "n:a" -> teamObj
  if(allDone){
    var thirds=groups.map(function(g){return {g:g,t:_rankGroup(tbl,g)[2]};});
    thirds.sort(function(a,b){return b.t.pts-a.t.pts||(b.t.gf-b.t.ga)-(a.t.gf-a.t.ga)||b.t.gf-a.t.gf||a.g.localeCompare(b.g);});
    var qual=thirds.slice(0,8);                              // 8 лучших третьих
    var qualKey=qual.map(function(x){return x.g;}).sort().join(""); // ключ для FIFA_Q3
    var assigned=FIFA_Q3[qualKey];                           // строка из 8 групп
    if(assigned){
      for(var i=0;i<Q3_COLS.length;i++){
        var winG=Q3_COLS[i], thirdG=assigned[i];             // победитель группы winG vs 3-е группы thirdG
        var slotN=Q3_SLOT[winG];                             // матч 1/16, третья — гость
        thirdAssign[slotN+":a"]=_teamObj(_rankGroup(tbl,thirdG)[2]);
      }
    }
  }
  var koResult={};
  WC_DATA.matches.filter(function(m){return m.stage in KO_ORDER;})
    .sort(function(a,b){return KO_ORDER[a.stage]-KO_ORDER[b.stage]||a.n-b.n;})
    .forEach(function(m){
      var h=_resolveSlot(m.homeEn,slot,thirdAssign,koResult)||thirdAssign[m.n+":h"]||null;
      var a=_resolveSlot(m.awayEn,slot,thirdAssign,koResult)||thirdAssign[m.n+":a"]||null;
      if(h||a) RESOLVED[m.n]={home:h,away:a};
      var s=scoreOf(m,now);
      if(h&&a&&s.st==="finished"&&s.sh!==null&&s.sa!==null&&s.sh!==s.sa){
        koResult[m.n]=s.sh>s.sa?{W:h,L:a}:{W:a,L:h};
      }
    });
}
function mTeam(m,side){var r=RESOLVED[m.n];if(!r)return null;return side==="h"?r.home:r.away;}
function mName(m,side){var t=mTeam(m,side);if(t)return LANG==="ru"?t.name:t.nameEn;var ru=side==="h"?m.home:m.away;var en=side==="h"?(m.homeEn||m.home):(m.awayEn||m.away);return LANG==="ru"?ru:en;}
function mFlag(m,side){var t=mTeam(m,side);if(t)return t.flag||"";return (side==="h"?m.homeFlag:m.awayFlag)||"";}

// ---- demo "live" simulation: a match is LIVE for 105 min after kickoff if it has no stored score
function matchState(m,now){
  const ko=new Date(m.utc).getTime();
  const end=ko+105*60000;
  if(m.sh!==null && m.sa!==null) return "finished";
  if(now>=ko && now<end) return "live";
  if(now>=end) return "finished"; // played but score unknown in demo
  return "upcoming";
}
// demo live score: pseudo-random but stable per match, grows with elapsed time
function liveScore(m,now){
  const ko=new Date(m.utc).getTime();
  const mins=Math.floor((now-ko)/60000);
  const seed=m.n*7919;
  const r=(k)=>{const x=Math.sin(seed+k)*10000;return x-Math.floor(x);};
  let h=0,a=0;
  for(let g=15;g<=Math.min(mins,90);g+=15){ if(r(g)>0.62)h++; if(r(g+1000)>0.66)a++; }
  return [h,a,Math.min(mins,90)];
}

function fmtDate(s){const d=new Date(s+"T00:00:00");var wd=LANG==="ru"?WD_RU:WD_EN;var mo=LANG==="ru"?MONTHS_RU:MONTHS_EN;return wd[d.getDay()]+", "+d.getDate()+" "+mo[d.getMonth()];}

function timeIn(utc,tz){
  try{return new Intl.DateTimeFormat("ru-RU",{hour:"2-digit",minute:"2-digit",timeZone:tz}).format(new Date(utc));}
  catch(e){return new Intl.DateTimeFormat("ru-RU",{hour:"2-digit",minute:"2-digit"}).format(new Date(utc));}
}
function scoreOf(m,now){
  const st=matchState(m,now);

  return {sh:m.sh,sa:m.sa,min:null,st:st};
}

  const has=(s.sh!==null&&s.sa!==null);
  return '<div class="feat"><div class="bar"></div>'+
    '<div class="top"><div class="lvl"><span class="d"></span>Live · '+(s.min||0)+"'</div>"+
    '<div class="meta">'+stageFull(m)+' · '+m.cityFlag+' '+mCity(m)+'</div></div>'+
    '<div class="body">'+
      '<div class="side h"><span class="tn">'+mName(m,"h")+'</span><span class="fl">'+mFlag(m,"h")+'</span></div>'+
      '<div class="sc">'+(has?s.sh+" — "+s.sa:"— : —")+'</div>'+
      '<div class="side"><span class="fl">'+mFlag(m,"a")+'</span><span class="tn">'+mName(m,"a")+'</span></div>'+
    '</div></div>';
}

function matchRow(m,now){
  const s=scoreOf(m,now);
  const has=(s.sh!==null&&s.sa!==null);
  const hWin=has&&s.sh>s.sa, aWin=has&&s.sa>s.sh;
  let left;
  if(s.st==="live") left='<div class="tm live"><span class="d"></span>LIVE '+(s.min||0)+"'</div>";
  else left='<div class="tm">'+timeIn(m.utc,m.tz)+'</div>';
  let mid = has ? '<div class="mid has">'+s.sh+' — '+s.sa+'</div>' : '<div class="mid vs">'+L('vs')+'</div>';
  return '<div class="row">'+left+
    '<div class="side h"><span class="tn '+(hWin?'win':'')+'">'+mName(m,"h")+'</span><span class="fl">'+mFlag(m,"h")+'</span></div>'+
    mid+
    '<div class="side a"><span class="fl">'+mFlag(m,"a")+'</span><span class="tn '+(aWin?'win':'')+'">'+mName(m,"a")+'</span></div>'+
    '<div class="rmeta">'+stageShort(m)+' · '+mCity(m)+'</div>'+
    '</div>';
}

function renderSched(){
  const now=Date.now();
  const todayStr=localDateStr(new Date());
  const fs=document.getElementById("fStage").value;
  const fc=document.getElementById("fCity").value;
  const fst=document.getElementById("fStatus").value;
  let list=WC_DATA.matches.filter(function(m){
    if(fs!=="all"&&m.stage!==fs) return false;
    if(fc!=="all"&&m.city!==fc) return false;
    if(fst!=="all"&&matchState(m,now)!==fst) return false;
    return true;
  });
  const past=list.filter(function(m){return m.date<todayStr;});
  const current=list.filter(function(m){return m.date>=todayStr;});
  const data=showPast?past:current;
  document.getElementById("count").textContent=data.length+" "+L('countSuffix');
  const box=document.getElementById("view-sched");
  let html='<div class="pastbar">';
  if(showPast) html+='<button class="pastbtn on" id="pastToggle">'+L('backBtn')+'</button>';
  else html+='<button class="pastbtn" id="pastToggle">'+L('pastBtn')+' ('+past.length+')</button>';
  html+='</div>';
  if(!showPast){
    current.filter(function(m){return matchState(m,now)==="live";}).forEach(function(m){html+=featured(m,now);});
  }
  const dates=Object.keys(data.reduce(function(a,m){a[m.date]=1;return a;},{}));
  dates.sort(); if(showPast) dates.reverse();
  if(!data.length){
    html+='<div class="empty">'+(showPast?L('emptyPast'):L('emptyCur'))+'</div>';
  }else{
    dates.forEach(function(d){
      const isToday=(d===todayStr);
      html+='<div class="dayhead'+(isToday?' today':'')+'">'+fmtDate(d)+(isToday?' · '+L('today'):'')+'</div>';
      data.filter(function(m){return m.date===d;}).forEach(function(m){
        if(showPast||matchState(m,now)!=="live") html+=matchRow(m,now);
      });
    });
  }
  box.innerHTML=html;
  var pt=document.getElementById("pastToggle");
  if(pt) pt.addEventListener("click",function(){showPast=!showPast;renderSched();});
  var sd=document.getElementById("schedDate");
  if(sd) sd.innerHTML='<span class="d"></span>'+fmtDate(todayStr)+' · '+(showPast?L('archive'):L('todayAndOn'));
}

function computeStandings(){
  const now=Date.now();
  const tbl={};
  Object.keys(WC_DATA.groups).forEach(function(g){
    tbl[g]={};
    WC_DATA.groups[g].forEach(function(t){tbl[g][t.name]={name:t.name,nameEn:t.nameEn||t.name,flag:t.flag,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
  });
  WC_DATA.matches.forEach(function(m){
    if(m.stage!=="group")return;
    var s=scoreOf(m,now);
    if(s.sh===null||s.sa===null)return;
    const g=m.group,H=tbl[g][m.home],A=tbl[g][m.away];
    if(!H||!A)return;
    H.p++;A.p++;H.gf+=s.sh;H.ga+=s.sa;A.gf+=s.sa;A.ga+=s.sh;
    if(s.sh>s.sa){H.w++;A.l++;H.pts+=3;}
    else if(s.sa>s.sh){A.w++;H.l++;A.pts+=3;}
    else{H.d++;A.d++;H.pts++;A.pts++;}
  });
  return tbl;
}
function renderGroups(){
  const tbl=computeStandings();
  let html='<div class="gwrap">';
  Object.keys(tbl).forEach(function(g){
    const rows=Object.values(tbl[g]).sort(function(a,b){return b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf;});
    html+='<div class="gcard"><h3>'+L('group')+' '+g+'</h3><table>'+
      '<thead><tr><th></th><th class="tn" style="text-align:left">'+L('team')+'</th><th>'+L('thP')+'</th><th>'+L('thW')+'</th><th>'+L('thD')+'</th><th>'+L('thL')+'</th><th>'+L('thGD')+'</th><th>'+L('thPts')+'</th></tr></thead><tbody>';
    rows.forEach(function(t,i){
      const cls=i===0?"q1":i===1?"q2":i===2?"q3":"";
      const diff=(t.gf-t.ga);const ds=(diff>0?"+":"")+diff;
      html+='<tr class="'+cls+'"><td style="color:var(--mut2)">'+(i+1)+'</td>'+
        '<td class="tn">'+t.flag+' '+(LANG==="ru"?t.name:t.nameEn)+'</td>'+
        '<td>'+t.p+'</td><td>'+t.w+'</td><td>'+t.d+'</td><td>'+t.l+'</td><td>'+ds+'</td><td class="pts">'+t.pts+'</td></tr>';
    });
    html+='</tbody></table></div>';
  });
  html+='</div><div class="leg"><span class="a">'+L('legA')+'</span><span class="g">'+L('legG')+'</span></div>';
  document.getElementById("view-groups").innerHTML=html;
}

function renderBracket(){
  const cols=LANG==="ru"?BRACKET_COLS_RU:BRACKET_COLS_EN;
  let html='<div class="bracket">';
  cols.forEach(function(pair){
    const code=pair[0],label=pair[1];
    html+='<div class="bcol"><h4>'+label+'</h4>';
    WC_DATA.matches.filter(function(m){return m.stage===code||(code==="FINAL"&&m.stage==="3RD");}).forEach(function(m){
      const fin=m.stage==="FINAL";
      html+='<div class="btie '+(fin?'final':'')+'">'+
        '<div class="bn">'+(fin?'🏆 ':'')+L('matchN')+m.n+' · '+m.cityFlag+' '+mCity(m)+' · '+timeIn(m.utc,m.tz)+'</div>'+
        '<div class="bt"><span>'+mName(m,"h")+'</span><span class="bs">'+(m.sh!==null?m.sh:'–')+'</span></div>'+
        '<div class="bt"><span>'+mName(m,"a")+'</span><span class="bs">'+(m.sa!==null?m.sa:'–')+'</span></div>'+
      '</div>';
    });
    html+='</div>';
  });
  html+='</div>';
  document.getElementById("view-bracket").innerHTML=html;
}

function renderTicker(){
  const now=Date.now();
  const lives=WC_DATA.matches.filter(function(m){return matchState(m,now)==="live";});
  const todayStr=localDateStr(new Date());
  const next=WC_DATA.matches.filter(function(m){return m.date>=todayStr&&matchState(m,now)==="upcoming";}).slice(0,8);
  let parts=[];
  lives.forEach(function(m){var s=scoreOf(m,now);parts.push('<span>'+mName(m,"h").toUpperCase()+' <b>'+s.sh+' — '+s.sa+"</b> "+mName(m,"a").toUpperCase()+" · "+(s.min||0)+"'</span>");});
  next.forEach(function(m){parts.push('<span class="up">'+mName(m,"h").toUpperCase()+' — '+mName(m,"a").toUpperCase()+' · '+timeIn(m.utc,m.tz)+'</span>');});
  if(!parts.length) parts.push('<span class="up">—</span>');
  const seq=parts.join('');
  document.getElementById("ticker").innerHTML=seq+seq;
}

function tick(){document.getElementById("clk").textContent=new Date().toLocaleTimeString("ru-RU");}
function refresh(){
  computeBracket();
  const v=document.querySelector(".tab.on").dataset.view;
  if(v==="sched")renderSched();
  else if(v==="groups")renderGroups();
  else renderBracket();
  renderTicker();
}

function setView(v){
  document.querySelectorAll(".tab").forEach(function(x){x.classList.toggle("on",x.dataset.view===v);});
  document.getElementById("view-sched").style.display=v==="sched"?"":"none";
  document.getElementById("view-groups").style.display=v==="groups"?"":"none";
  document.getElementById("view-bracket").style.display=v==="bracket"?"":"none";
  document.getElementById("filters").style.display=v==="sched"?"flex":"none";
  document.querySelectorAll(".navlinks a").forEach(function(a){a.classList.toggle("on",a.dataset.jump===v);});
  refresh();
}

const STAGE_PILLS=[["all","stageAll"],["group","spGroups"],["R32","sp16"],["R16","sp8"],["QF","sp4"],["SF","sp2"],["FINAL","spFinal"]];
function buildStagePills(){
  var c=document.getElementById("stagePills");var cur=document.getElementById("fStage").value;c.innerHTML="";
  STAGE_PILLS.forEach(function(p){
    var el=document.createElement("span");
    el.className="pill"+(p[0]===cur?" on":"");
    el.textContent=L(p[1]); el.dataset.v=p[0];
    el.addEventListener("click",function(){
      document.querySelectorAll("#stagePills .pill").forEach(function(x){x.classList.remove("on");});
      el.classList.add("on");
      document.getElementById("fStage").value=p[0];
      renderSched();
    });
    c.appendChild(el);
  });
}
function buildCity(){
  var s=document.getElementById("fCity");var v=s.value;s.innerHTML="";
  var o0=document.createElement("option");o0.value="all";o0.textContent=L('allCities');s.appendChild(o0);
  WC_DATA.cities.forEach(function(c){var o=document.createElement("option");o.value=c.ru;o.textContent=LANG==="ru"?c.ru:c.en;s.appendChild(o);});
  s.value=v||"all";
}
function buildStatus(){
  var s=document.getElementById("fStatus");var v=s.value;s.innerHTML="";
  [["all",L('allMatches')],["live",L('stLive')],["upcoming",L('stUp')],["finished",L('stFin')]].forEach(function(p){
    var o=document.createElement("option");o.value=p[0];o.textContent=p[1];s.appendChild(o);
  });
  s.value=v||"all";
}

function applyLang(){
  document.documentElement.lang=LANG;
  document.getElementById("langRU").classList.toggle("on",LANG==="ru");
  document.getElementById("langEN").classList.toggle("on",LANG==="en");
  document.getElementById("nlMatches").innerHTML=L('navMatches');
  document.getElementById("nlGroups").innerHTML=L('navGroups');
  document.getElementById("nlBracket").innerHTML=L('navBracket');
  document.getElementById("heroEyebrow").textContent=L('eyebrow');
  document.getElementById("heroTitle").innerHTML=L('title');
  document.getElementById("heroLead").innerHTML=L('lead')+'<small>'+L('leadSm')+'</small>';
  document.getElementById("ctaLive").innerHTML='<span class="d"></span>'+L('watch');
  document.getElementById("ctaSched").textContent=L('schedule');
  document.getElementById("stTeams").textContent=L('stTeams');
  document.getElementById("stMatches").textContent=L('stMatches');
  document.getElementById("stHosts").textContent=L('stHosts');
  document.getElementById("secTitle").innerHTML=L('secTitle');
  document.getElementById("tabMatches").textContent=L('tabMatches');
  document.getElementById("tabGroups").textContent=L('tabGroups');
  document.getElementById("tabBracket").textContent=L('tabBracket');
  document.getElementById("footer").innerHTML=L('footer');
  if(window.__apiActive===true) document.getElementById("note").textContent=L('liveNote');
  else if(window.__apiActive===false) document.getElementById("note").textContent=L('apiErr');
  else document.getElementById("note").textContent=L('noteDemo');
  buildStagePills();buildCity();buildStatus();
  refresh();
}

document.querySelectorAll(".tab").forEach(function(t){t.addEventListener("click",function(){setView(t.dataset.view);});});
document.querySelectorAll(".navlinks a[data-jump]").forEach(function(a){a.addEventListener("click",function(){setView(a.dataset.jump);document.querySelector(".main").scrollIntoView({behavior:"smooth"});});});
document.getElementById("ctaSched").addEventListener("click",function(){setView("sched");document.querySelector(".main").scrollIntoView({behavior:"smooth"});});
document.getElementById("ctaLive").addEventListener("click",function(){setView("sched");document.getElementById("fStatus").value="live";renderSched();document.querySelector(".main").scrollIntoView({behavior:"smooth"});});
function setLang(l){LANG=l;try{localStorage.setItem("mundial_lang",l);}catch(e){}applyLang();}
document.getElementById("langRU").addEventListener("click",function(){setLang("ru");});
document.getElementById("langEN").addEventListener("click",function(){setLang("en");});
["fCity","fStatus"].forEach(function(id){document.getElementById(id).addEventListener("change",renderSched);});

applyLang();

tick();setInterval(tick,1000);
refresh();
function scheduleRefresh(){
  const now=Date.now();
  const anyLive=WC_DATA.matches.some(function(m){return matchState(m,now)==="live";});
  refresh();
  document.getElementById("clkd").textContent=anyLive?"🔴 идут матчи · обновление 30с":"обновление 60с";
  setTimeout(scheduleRefresh, anyLive?30000:60000);
}
setTimeout(scheduleRefresh, 30000);
</script>
